version: '3.8'

services:
  rpa-scheduler:
    build: .
    container_name: rpa-scheduler
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1  # 确保 Python 输出不缓冲
      - DATA_DIR=/app/data
    restart: unless-stopped
    networks:
      - rpa-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    container_name: rpa-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - rpa-scheduler
    restart: unless-stopped
    networks:
      - rpa-network

networks:
  rpa-network:
    driver: bridge
